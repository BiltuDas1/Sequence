name: Maestro UI Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  maestro:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout Code
        uses: actions/checkout@v6.0.3

      - name: Set up JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

#      - name: Decode and Place Google Services JSON
#        run: echo "${{ secrets.GOOGLE_SERVICES }}" | base64 --decode > app/google-services.json
#
#      - name: Grant Execute Permissions to Gradle
#        run: chmod +x gradlew
#
#      - name: Build Debug APK
#        run: ./gradlew assembleDebug --build-cache --parallel --no-daemon

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Maestro Tests
        uses: ReactiveCircus/android-emulator-runner@v2.38.0
        with:
          target: google_atd
          api-level: 35
          arch: x86_64
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -dns-server 8.8.8.8 -netfast
          disable-animations: true
          script: |
            bash .github/scripts/wait_for_emulator.sh
            
            echo "Installing APK..."
            # adb install app/build/outputs/apk/debug/app-debug.apk
            adb install prebuild/app-debug.apk
            
            echo "Starting Maestro Tests..."
            $HOME/.maestro/bin/maestro test .maestro/
        env:
          MAESTRO_SEQUENCE_SERVER_URI: "${{ secrets.SEQUENCE_SERVER_URI }}"

      - name: Upload Maestro Reports
        if: always()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: maestro-report
          path: |
            ~/.maestro/tests/
            report.xml
